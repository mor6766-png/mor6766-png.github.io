<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מועמדים | מור</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Heebo',sans-serif;background:#F7F5F2;color:#1A1A2E;direction:rtl;min-height:100vh}
  .top{background:#1A1A2E;padding:18px 28px;display:flex;align-items:center;justify-content:space-between}
  .top h1{color:#fff;font-size:18px;font-weight:600;letter-spacing:-0.3px}
  .top span{color:#888;font-size:13px}
  .container{max-width:960px;margin:0 auto;padding:28px 20px}
  .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
  .toolbar input{flex:1;min-width:180px;border:1.5px solid #E0DDD8;border-radius:9px;padding:9px 14px;font-size:14px;background:#fff;font-family:'Heebo',sans-serif;outline:none;color:#333}
  .toolbar input:focus{border-color:#aaa}
  .btn{border:1.5px solid #E0DDD8;border-radius:9px;padding:9px 16px;font-size:13px;cursor:pointer;background:#fff;color:#444;font-family:'Heebo',sans-serif;white-space:nowrap}
  .btn:hover{background:#F0EDE8}
  .btn.primary{background:#1A1A2E;color:#fff;border-color:#1A1A2E}
  .btn.primary:hover{background:#2d2d4a}
  .btn.danger{border-color:#FFCCCC;color:#c0392b}
  .btn.danger:hover{background:#fff0f0}
  .stats{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .stat{background:#fff;border:1.5px solid #E8E5E0;border-radius:10px;padding:7px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Heebo',sans-serif}
  .stat .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .stat.active{background:#1A1A2E;color:#fff;border-color:#1A1A2E}
  .stat.active .count{color:#aaa}
  .count{color:#999;font-size:12px}
  .card{background:#fff;border-radius:14px;border:1.5px solid #E8E5E0;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
  table{width:100%;border-collapse:collapse;table-layout:fixed}
  colgroup col:nth-child(1){width:20%}
  colgroup col:nth-child(2){width:17%}
  colgroup col:nth-child(3){width:14%}
  colgroup col:nth-child(4){width:13%}
  colgroup col:nth-child(5){width:28%}
  colgroup col:nth-child(6){width:8%}
  thead tr{background:#F7F5F2}
  th{font-size:12px;font-weight:600;color:#888;padding:11px 12px;text-align:right;border-bottom:1.5px solid #E8E5E0;cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:#444}
  td{font-size:13px;padding:12px 12px;border-bottom:1px solid #F0EDE8;vertical-align:middle;color:#333}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#FAFAF8}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:'Heebo',sans-serif;appearance:none;-webkit-appearance:none}
  .notes-cell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#777}
  .actions{display:flex;gap:5px}
  .icon-btn{background:none;border:1px solid #E0DDD8;border-radius:7px;padding:5px 8px;font-size:13px;cursor:pointer;line-height:1}
  .icon-btn:hover{background:#F0EDE8}
  .empty{padding:40px;text-align:center;color:#bbb;font-size:14px}

  /* Modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:20px}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  .modal h2{font-size:17px;font-weight:700;margin-bottom:18px;color:#1A1A2E}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid #E0DDD8;border-radius:9px;padding:9px 12px;font-size:14px;font-family:'Heebo',sans-serif;outline:none;color:#333;background:#fff}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:#aaa}
  .field textarea{resize:vertical}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

  /* Delete confirm */
  .confirm-box{text-align:center;padding:8px 0}
  .confirm-box .icon{font-size:30px;margin-bottom:10px}
  .confirm-box p{font-size:14px;color:#555;margin-bottom:18px}

  @media(max-width:640px){
    colgroup col:nth-child(4),colgroup col:nth-child(5){display:none}
    td:nth-child(4),td:nth-child(5),th:nth-child(4),th:nth-child(5){display:none}
    .container{padding:16px 12px}
  }
</style>
</head>
<body>

<div class="top">
  <h1>מעקב מועמדים</h1>
  <span id="total-label">0 מועמדים</span>
</div>

<div class="container">
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍  חיפוש לפי שם, טלפון או הערה..." oninput="applyFilters()">
    <button class="btn primary" onclick="openAdd()">+ מועמד חדש</button>
    <button class="btn" onclick="exportCSV()">⬇ ייצוא CSV</button>
  </div>

  <div class="stats" id="stats-bar"></div>

  <div class="card">
    <table>
      <colgroup><col><col><col><col><col><col></colgroup>
      <thead>
        <tr>
          <th onclick="toggleSort('name')">שם <span id="sort-name"></span></th>
          <th onclick="toggleSort('phone')">טלפון <span id="sort-phone"></span></th>
          <th onclick="toggleSort('status')">סטטוס <span id="sort-status"></span></th>
          <th onclick="toggleSort('date')">תאריך <span id="sort-date"></span></th>
          <th>הערות</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <div id="count-label" style="text-align:center;font-size:12px;color:#bbb;margin-top:10px;"></div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">מועמד חדש</h2>
    <div class="field"><label>שם מלא</label><input id="f-name" type="text"></div>
    <div class="field"><label>טלפון</label><input id="f-phone" type="tel"></div>
    <div class="field"><label>סטטוס</label>
      <select id="f-status">
        <option>ליד</option><option>שיחה</option><option>נרשם</option><option>לא רלוונטי</option>
      </select>
    </div>
    <div class="field"><label>תאריך יצירת קשר</label><input id="f-date" type="date"></div>
    <div class="field"><label>הערות</label><textarea id="f-notes" rows="3"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">ביטול</button>
      <button class="btn primary" id="save-btn" onclick="saveRecord()">הוסף</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="overlay" id="delete-overlay">
  <div class="modal" style="max-width:320px">
    <div class="confirm-box">
      <div class="icon">🗑</div>
      <h2>למחוק מועמד?</h2>
      <p id="delete-name-label">הפעולה לא ניתנת לביטול</p>
      <div class="modal-actions" style="justify-content:center">
        <button class="btn" onclick="closeDelete()">ביטול</button>
        <button class="btn danger" onclick="confirmDelete()">מחק</button>
      </div>
    </div>
  </div>
</div>

<script>
const STATUS_COLORS = {
  "ליד":          {bg:"#FFF3CD", color:"#856404"},
  "שיחה":         {bg:"#CCE5FF", color:"#004085"},
  "נרשם":         {bg:"#D4EDDA", color:"#155724"},
  "לא רלוונטי":   {bg:"#F0F0F0", color:"#555"}
};
const STATUSES = ["ליד","שיחה","נרשם","לא רלוונטי"];

let candidates = JSON.parse(localStorage.getItem('candidates') || '[]');
if (!candidates.length) {
  candidates = [
    {id:1, name:"שירה לוי",   phone:"050-1234567", status:"שיחה",       date:"2026-05-20", notes:"מעוניינת, תחזור אחרי החגים"},
    {id:2, name:"דניאל כהן",  phone:"052-9876543", status:"ליד",        date:"2026-05-22", notes:"הגיע מלינקדאין"},
    {id:3, name:"מיכל ברק",   phone:"054-1112223", status:"נרשם",       date:"2026-05-18", notes:"סוכם – מתחיל ב-1/6"},
  ];
  save();
}

let filterStatus = "הכל";
let search = "";
let sortCol = "date";
let sortDir = -1;
let editId = null;
let deleteId = null;

function save() { localStorage.setItem('candidates', JSON.stringify(candidates)); }

function filtered() {
  return candidates
    .filter(c => filterStatus === "הכל" || c.status === filterStatus)
    .filter(c => !search || c.name.includes(search) || c.phone.includes(search) || (c.notes||"").includes(search))
    .sort((a,b) => {
      const va = a[sortCol]||"", vb = b[sortCol]||"";
      return va > vb ? sortDir : va < vb ? -sortDir : 0;
    });
}

function toggleSort(col) {
  if (sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=-1;}
  render();
}

function applyFilters() {
  search = document.getElementById('search-input').value;
  render();
}

function setFilter(st) {
  filterStatus = filterStatus===st ? "הכל" : st;
  render();
}

function fmtDate(d) {
  if (!d) return "";
  const [y,m,day] = d.split("-");
  return `${day}/${m}/${y}`;
}

function render() {
  const rows = filtered();
  const counts = {};
  STATUSES.forEach(s => counts[s] = candidates.filter(c=>c.status===s).length);

  document.getElementById('total-label').textContent = candidates.length + " מועמדים";

  // Stats bar
  let statsHtml = `<div class="stat ${filterStatus==='הכל'?'active':''}" onclick="setFilter('הכל')"><span class="dot" style="background:#aaa"></span>הכל <span class="count">${candidates.length}</span></div>`;
  STATUSES.forEach(s => {
    const col = STATUS_COLORS[s];
    statsHtml += `<div class="stat ${filterStatus===s?'active':''}" onclick="setFilter('${s}')"><span class="dot" style="background:${col.color}"></span>${s} <span class="count">${counts[s]}</span></div>`;
  });
  document.getElementById('stats-bar').innerHTML = statsHtml;

  // Sort arrows
  ['name','phone','status','date'].forEach(col => {
    const el = document.getElementById('sort-'+col);
    if (el) el.textContent = sortCol===col ? (sortDir===-1?'↓':'↑') : '';
  });

  // Table
  if (!rows.length) {
    document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="empty">לא נמצאו מועמדים</td></tr>`;
  } else {
    document.getElementById('table-body').innerHTML = rows.map(c => {
      const col = STATUS_COLORS[c.status] || {};
      return `<tr>
        <td style="font-weight:600">${esc(c.name)}</td>
        <td style="direction:ltr;text-align:right">${esc(c.phone)}</td>
        <td>
          <select class="badge" style="background:${col.bg};color:${col.color}" onchange="changeStatus(${c.id},this.value)">
            ${STATUSES.map(s=>`<option value="${s}" ${c.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </td>
        <td style="color:#888">${fmtDate(c.date)}</td>
        <td class="notes-cell" title="${esc(c.notes||'')}">${esc(c.notes||'—')}</td>
        <td><div class="actions">
          <button class="icon-btn" onclick="openEdit(${c.id})" title="עריכה">✏️</button>
          <button class="icon-btn" onclick="askDelete(${c.id})" title="מחיקה" style="border-color:#ffcccc">🗑</button>
        </div></td>
      </tr>`;
    }).join('');
  }

  document.getElementById('count-label').textContent = rows.length + " מתוך " + candidates.length;
}

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function changeStatus(id, st) {
  candidates = candidates.map(c => c.id===id ? {...c, status:st} : c);
  save(); render();
}

function openAdd() {
  editId = null;
  document.getElementById('modal-title').textContent = "מועמד חדש";
  document.getElementById('save-btn').textContent = "הוסף";
  document.getElementById('f-name').value = "";
  document.getElementById('f-phone').value = "";
  document.getElementById('f-status').value = "ליד";
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-notes').value = "";
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),80);
}

function openEdit(id) {
  const c = candidates.find(x=>x.id===id);
  editId = id;
  document.getElementById('modal-title').textContent = "עריכת מועמד";
  document.getElementById('save-btn').textContent = "שמור";
  document.getElementById('f-name').value = c.name;
  document.getElementById('f-phone').value = c.phone;
  document.getElementById('f-status').value = c.status;
  document.getElementById('f-date').value = c.date;
  document.getElementById('f-notes').value = c.notes||"";
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),80);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function saveRecord() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const rec = {
    name,
    phone: document.getElementById('f-phone').value.trim(),
    status: document.getElementById('f-status').value,
    date: document.getElementById('f-date').value,
    notes: document.getElementById('f-notes').value.trim()
  };
  if (editId !== null) {
    candidates = candidates.map(c => c.id===editId ? {...c,...rec} : c);
  } else {
    rec.id = Date.now();
    candidates.push(rec);
  }
  save(); closeModal(); render();
}

function askDelete(id) {
  deleteId = id;
  const c = candidates.find(x=>x.id===id);
  document.getElementById('delete-name-label').textContent = c ? `"${c.name}" יימחק לצמיתות` : "הפעולה לא ניתנת לביטול";
  document.getElementById('delete-overlay').classList.add('open');
}

function closeDelete() { document.getElementById('delete-overlay').classList.remove('open'); deleteId=null; }

function confirmDelete() {
  candidates = candidates.filter(c=>c.id!==deleteId);
  save(); closeDelete(); render();
}

function exportCSV() {
  const rows = [["שם","טלפון","סטטוס","תאריך","הערות"]];
  candidates.forEach(c => rows.push([c.name, c.phone, c.status, fmtDate(c.date), c.notes||""]));
  const csv = "\uFEFF" + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = "מועמדים.csv";
  a.click();
}

// Enter key in modal
document.addEventListener('keydown', e => {
  if (e.key==="Escape") { closeModal(); closeDelete(); }
  if (e.key==="Enter" && document.getElementById('modal-overlay').classList.contains('open')) saveRecord();
});

render();
</script>
</body>
</html>
